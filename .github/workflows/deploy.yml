name: Deploy Apps

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    needs: build
    if: success()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install
      - run: pnpm run build --recursive 2>/dev/null || true

      - name: Create deployment status
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              production_environment: true
            }).then(d => {
              github.rest.repos.createDeploymentStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                deployment_id: d.data.id,
                state: 'success',
                environment_url: 'https://smallwebapps.com'
              })
            })

      - name: Log deployment
        run: echo "Apps deployed to production. Update this step with your hosting provider deployment commands."
